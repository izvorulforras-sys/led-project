<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LED vezérlés</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b 50%, #0b1220);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .panel {
      width: 100%;
      max-width: 460px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }
    .sub {
      margin: 0 0 22px;
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
    }
    .status-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      margin-bottom: 18px;
    }
    .status-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .led-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 rgba(239, 68, 68, 0.7);
      transition: all 0.25s ease;
    }
    .led-dot.on {
      background: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.9);
    }
    .label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .value {
      font-size: 18px;
      font-weight: 700;
    }
    .toggle-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 18px 20px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(180deg, #22c55e, #16a34a);
      box-shadow: 0 10px 24px rgba(34,197,94,0.3);
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      margin-bottom: 18px;
    }
    .toggle-btn:hover { transform: translateY(-1px); }
    .toggle-btn:active {
      transform: scale(0.98);
      box-shadow: 0 6px 14px rgba(34,197,94,0.25);
    }
    .toggle-btn.off-mode {
      background: linear-gradient(180deg, #ef4444, #dc2626);
      box-shadow: 0 10px 24px rgba(239,68,68,0.3);
    }
    .mode-title {
      font-size: 14px;
      color: #cbd5e1;
      margin: 0 0 10px;
    }
    .modes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .mode-btn {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-radius: 14px;
      padding: 12px 10px;
      cursor: pointer;
      font-weight: 700;
      transition: all .15s ease;
    }
    .mode-btn.active {
      background: #2563eb;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,.25);
    }
    .note {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.45;
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .small {
      margin-top: 12px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>LED vezérlés</h1>
    <p class="sub">Egyszerű, egy fájlos vezérlő hang / néma / rezgés móddal.</p>

    <div class="status-box">
      <div class="status-left">
        <div id="ledDot" class="led-dot"></div>
        <div>
          <div class="label">Állapot</div>
          <div id="statusText" class="value">Kikapcsolva</div>
        </div>
      </div>
      <div>
        <div class="label">Mód</div>
        <div id="modeText" class="value">Bip</div>
      </div>
    </div>

    <button id="toggleBtn" class="toggle-btn" onclick="toggleLed()">Bekapcsolás</button>

    <p class="mode-title">Visszajelzés mód:</p>
    <div class="modes">
      <button class="mode-btn" data-mode="silent" onclick="setMode('silent')">Néma</button>
      <button class="mode-btn" data-mode="bip" onclick="setMode('bip')">Bip</button>
      <button class="mode-btn" data-mode="vibrate" onclick="setMode('vibrate')">Rezeg</button>
    </div>

    <div class="note">
      Ez a fájl önmagában fut. A bip hang külső hangfájl nélkül működik. A rezgés funkció főleg mobilon működik.
    </div>

    <div class="small">A választott mód és a LED állapot elmentődik a böngészőben.</div>
  </div>

  <script>
    let ledOn = false;
    let mode = localStorage.getItem('feedbackMode') || 'bip';

    function saveState() {
      localStorage.setItem('feedbackMode', mode);
      localStorage.setItem('ledState', ledOn ? 'on' : 'off');
    }

    function restoreState() {
      ledOn = localStorage.getItem('ledState') === 'on';
      updateUI();
      setMode(mode, false);
    }

    function updateUI() {
      const ledDot = document.getElementById('ledDot');
      const statusText = document.getElementById('statusText');
      const toggleBtn = document.getElementById('toggleBtn');

      if (ledOn) {
        ledDot.classList.add('on');
        statusText.textContent = 'Bekapcsolva';
        toggleBtn.textContent = 'Kikapcsolás';
        toggleBtn.classList.add('off-mode');
      } else {
        ledDot.classList.remove('on');
        statusText.textContent = 'Kikapcsolva';
        toggleBtn.textContent = 'Bekapcsolás';
        toggleBtn.classList.remove('off-mode');
      }
    }

    function setMode(newMode, save = true) {
      mode = newMode;
      const modeText = document.getElementById('modeText');
      const labels = {
        silent: 'Néma',
        bip: 'Bip',
        vibrate: 'Rezeg'
      };
      modeText.textContent = labels[newMode] || 'Bip';

      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === newMode);
      });

      if (save) saveState();
    }

    function playBeep() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const audioContext = new AudioContextClass();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
      gainNode.gain.setValueAtTime(0.001, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.12, audioContext.currentTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.13);

      oscillator.onended = () => {
        if (audioContext.state !== 'closed') audioContext.close();
      };
    }

    function playFeedback() {
      if (mode === 'silent') return;
      if (mode === 'bip') {
        playBeep();
        return;
      }
      if (mode === 'vibrate' && navigator.vibrate) {
        navigator.vibrate(120);
      }
    }

    function toggleLed() {
      ledOn = !ledOn;
      playFeedback();
      updateUI();
      saveState();

      // Itt tudod később hozzáadni a valódi LED vezérlésedet, pl. fetch() hívással.
      // Példa:
      // fetch('/api/led', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({ state: ledOn ? 'on' : 'off' })
      // });
    }

    restoreState();
  </script>
</body>
</html>
